name: itogena_v45
description: ITOGENA Arılık Yönetim Sistemi
publish_to: "none"

version: 1.0.13+15


environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # VERİTABANI
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.5

  # DOSYA & PAYLAŞIM
  share_plus: ^10.1.4
  file_picker: ^8.0.0

  # DIŞA AKTARMA
  pdf: ^3.10.8
  excel: ^4.0.6

  # SATIN ALMA & GÜNCELLEME
  in_app_purchase: ^3.2.0
  in_app_update: ^4.2.3
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.1
  speech_to_text: ^7.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/ikon.png
  adaptive_icon_background: "#F5B400"
  adaptive_icon_foreground: assets/images/ikon_foreground.png
